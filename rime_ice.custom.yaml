# Rime schema custom settings
# encoding: utf-8

patch:
  # ===== 输入状态 =====
  # 关闭 ascii_mode 在切换窗口/应用时的自动重置，保持上次中英文状态
  switches/@0/reset: 0

  # ===== 整句能力与学习 =====
  # 启用用户词典学习：你选过的词会逐步前移
  translator/enable_user_dict: true
  # 启用整句组词/组句，提高长句首屏命中
  translator/enable_sentence: true
  # 启用候选补全（未打完整时给出可用词）
  translator/enable_completion: true
  # 启用多音节词补全（长编码补全更明显）
  translator/enable_word_completion: true
  # 允许补全结果参与整句组句
  translator/sentence_over_completion: true
  # 启用上下文预测（根据前后文调整候选）
  translator/contextual_suggestions: true
  # 启用编码器：让整句上屏更容易沉淀为可复用词组（需前端/librime 支持）
  translator/enable_encoder: true
  # 编码器参考最近上屏历史，增强整句学习效果（需前端/librime 支持）
  translator/encode_commit_history: true
  # 组句时允许的最大短语长度。
  # 雾凇默认：未显式设置（跟随 librime）。
  # 建议：稳妥 6~7，均衡 8，激进长句 10（>10 容易增加误联想）。
  translator/max_phrase_length: 8

  # ===== 候选排序与权重 =====
  # 中文主翻译器权重。
  # 雾凇默认：1.2。
  # 建议：均衡 1.4~1.6，中文强优先 1.7~1.9（过高会压制英文/混输）。
  translator/initial_quality: 1.6

  # 长词优先提升数量（每次前移的长词个数）。
  # 雾凇默认：2。
  # 建议：保守 2，均衡 3，激进 4（过高可能扰动前排短词）。
  long_word_filter/count: 3
  # 长词插入起始位（从第几个候选开始插入）。
  # 雾凇默认：4。
  # 建议：稳妥 4，均衡 3，激进 2（越小越容易改变首屏顺序）。
  long_word_filter/idx: 3

  # ===== 英文/混输干扰控制 =====
  # 降低短英文误置顶：按内置规则处理 3~4 字母易冲突编码
  reduce_english_filter/mode: all
  # 把命中的英文候选下沉到第 idx 位之后。
  # 雾凇默认：2。
  # 建议：轻度抑制 2，均衡 3，强抑制 4。
  reduce_english_filter/idx: 4

  # 英文翻译器权重。
  # 雾凇默认：1.1。
  # 软关闭建议：0.05~0.2（越低越不容易出现在前排）。
  melt_eng/initial_quality: 0.05
  # 中英混输翻译器权重。
  # 雾凇默认：0.5。
  # 软关闭建议：0.01~0.1（通常低于 melt_eng，避免混输词抢前排）。
  cn_en/initial_quality: 0.01

  # ===== 自定义短语 =====
  # 自定义短语改为 tabledb：允许短语动态调频学习
  custom_phrase/db_class: tabledb

  # ===== 词典策略开关 =====
  # 主词典入口：
  # - rime_ice      -> 仅雾凇原词库（最稳）
  # - rime_ice_lmdg -> 雾凇 + LMDG 聚合词库（词汇覆盖更强）
  # 建议：先用 rime_ice_lmdg 观察 3~7 天；若噪声升高可临时切回 rime_ice。
  translator/dictionary: rime_ice_lmdg
